image: 
  name: hashicorp/terraform:1.5
  entrypoint: ["/bin/sh", "-c"]

default:
  id_tokens:
    AWS_ID_TOKEN:
      aud: https://gitlab.com

stages:
  - bootstrap
  - validate
  - plan  script:
    - cd bootstrap
    - terraform init -backend=false
    - |
      if aws dynamodb describe-table --table-name terraform-locks --region $AWS_DEFAULT_REGION 2>/dev/null; then
        echo "DynamoDB table exists, importing..."
        terraform import aws_dynamodb_table.lock terraform-locks || echo "Import failed or already managed"
      else
        echo "DynamoDB table does not exist, will create"
      fi
    - if aws s3api head-bucket --bucket devops-platform4-terraform-state --region $AWS_DEFAULT_REGION 2>/dev/null; then terraform import aws_s3_bucket.state devops-platform4-terraform-state || true; fi
    - terraform apply -auto-approve
  - apply


before_script:
  - terraform --version
  - apk add --no-cache git curl jq python3 py3-pip
  - pip3 install --no-cache-dir awscli

  # OIDC setup
  - echo "$AWS_ID_TOKEN" > /tmp/web_identity_token
  - export AWS_ROLE_ARN=$AWS_ROLE_ARN
  - export AWS_WEB_IDENTITY_TOKEN_FILE=/tmp/web_identity_token
  - export AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION
  - echo "AWS_ROLE_ARN=$AWS_ROLE_ARN"
  - echo "AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION"
  - env | grep AWS

# ---------------- BOOTSTRAP ---------------- #

bootstrap:
  stage: bootstrap
  script:
    - cd bootstrap
    - terraform init -backend=false
    - if aws s3api head-bucket --bucket devops-platform4-terraform-state >/dev/null 2>&1; then terraform import aws_s3_bucket.state devops-platform4-terraform-state; fi
    - if aws dynamodb describe-table --table-name terraform-locks >/dev/null 2>&1; then terraform import aws_dynamodb_table.lock terraform-locks; fi
    - terraform apply -auto-approve
    - aws sts get-caller-identity
    - aws s3 ls s3://devops-platform4-terraform-state

# ---------------- DEV ---------------- #

validate_dev:
  stage: validate
  script:
    - cd envs/dev
    - terraform init
    - terraform validate

plan_dev:
  stage: plan
  script:
    - cd envs/dev
    - terraform init
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - envs/dev/tfplan

apply_dev:
  stage: apply
  when: manual
  script:
    - cd envs/dev
    - terraform init
    - terraform apply -auto-approve tfplan

# ---------------- PROD ---------------- #

validate_prod:
