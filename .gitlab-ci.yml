image: 
  name: hashicorp/terraform:1.5
  entrypoint: ["/bin/sh", "-c"]

default:
  id_tokens:
    AWS_ID_TOKEN:
      aud: https://gitlab.com

stages:
  - bootstrap
  - validate
  - plan
  - apply


before_script:
  - terraform --version
  - apk add --no-cache git curl jq python3 py3-pip
  - pip3 install --no-cache-dir awscli

  # OIDC setup
  - echo "$AWS_ID_TOKEN" > /tmp/web_identity_token
  - export AWS_ROLE_ARN=$AWS_ROLE_ARN
  - export AWS_WEB_IDENTITY_TOKEN_FILE=/tmp/web_identity_token
  - export AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-west-2}
  - export AWS_REGION=$AWS_DEFAULT_REGION
  - echo "AWS_ROLE_ARN=$AWS_ROLE_ARN"
  - echo "AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION"
  - echo "AWS_REGION=$AWS_REGION"
  - env | grep AWS

# ---------------- BOOTSTRAP ---------------- #

bootstrap:
  stage: bootstrap
  script:
    - cd bootstrap
    - set -o pipefail
    - terraform init -backend=false
    - |
      echo "[BOOTSTRAP] current local state:"
      terraform state list || true
    - |
      echo "[BOOTSTRAP] Importing existing S3 bucket if present..."
      if ! terraform state list | grep -q '^aws_s3_bucket.state$'; then
        if terraform import aws_s3_bucket.state devops-platform4-terraform-state 2>/tmp/terraform_import_s3.log; then
          echo "[BOOTSTRAP] S3 bucket imported successfully"
        else
          echo "[BOOTSTRAP] S3 import failed, details:";
          cat /tmp/terraform_import_s3.log
          if aws s3api head-bucket --bucket devops-platform4-terraform-state --region $AWS_DEFAULT_REGION >/dev/null 2>&1; then
            echo "[BOOTSTRAP] S3 bucket exists but import failed; aborting to avoid state mismatch"
            exit 1
          else
            echo "[BOOTSTRAP] S3 bucket does not exist, will be created by apply"
          fi
        fi
      else
        echo "[BOOTSTRAP] S3 bucket is already in state"
      fi
    - |
      echo "[BOOTSTRAP] Importing existing DynamoDB lock table if present..."
      if ! terraform state list | grep -q '^aws_dynamodb_table.lock$'; then
        if terraform import aws_dynamodb_table.lock terraform-locks 2>/tmp/terraform_import_dynamo.log; then
          echo "[BOOTSTRAP] DynamoDB lock table imported successfully"
        else
          echo "[BOOTSTRAP] DynamoDB import failed, details:";
          cat /tmp/terraform_import_dynamo.log
          if aws dynamodb describe-table --table-name terraform-locks --region $AWS_DEFAULT_REGION >/dev/null 2>&1; then
            echo "[BOOTSTRAP] DynamoDB table exists but import failed; aborting to avoid state mismatch"
            exit 1
          else
            echo "[BOOTSTRAP] DynamoDB lock table does not exist, will be created by apply"
          fi
        fi
      else
        echo "[BOOTSTRAP] DynamoDB lock table is already in state"
      fi
    - |
      echo "[BOOTSTRAP] current local state after imports:"
      terraform state list || true
    - |
      echo "[BOOTSTRAP] planning bootstrap"
      terraform plan -detailed-exitcode -out=tfbootstrap.plan
      PLAN_EXIT=$?
      if [ "$PLAN_EXIT" -eq 2 ]; then
        echo "[BOOTSTRAP] plan detected changes. Aborting to avoid creating existing backend resources."
        terraform show -no-color tfbootstrap.plan
        exit 1
      fi
      if [ "$PLAN_EXIT" -eq 1 ]; then
        echo "[BOOTSTRAP] plan failed"
        exit 1
      fi
    - echo "[BOOTSTRAP] Applying bootstrap configuration..."
    - terraform apply -auto-approve tfbootstrap.plan
    - echo "[BOOTSTRAP] Bootstrap complete. Verifying resources..."
    - aws sts get-caller-identity
    - aws s3 ls s3://devops-platform4-terraform-state
    - aws dynamodb describe-table --table-name terraform-locks --region $AWS_DEFAULT_REGION

# ---------------- DEV ---------------- #

validate_dev:
  stage: validate
  script:
    - cd envs/dev
    - terraform init
    - terraform validate

plan_dev:
  stage: plan
  script:
    - cd envs/dev
    - terraform init
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - envs/dev/tfplan

apply_dev:
  stage: apply
  when: manual
  script:
    - cd envs/dev
    - terraform init
    - terraform apply -auto-approve tfplan

