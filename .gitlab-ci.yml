image: 
  name: hashicorp/terraform:1.5
  entrypoint: ["/bin/sh", "-c"]

default:
  id_tokens:
    AWS_ID_TOKEN:
      aud: https://gitlab.com

stages:
  - bootstrap
  - validate
  - plan
  - apply


before_script:
  - terraform --version
  - apk add --no-cache git curl jq python3 py3-pip
  - pip3 install --no-cache-dir awscli

  # OIDC setup
  - echo "$AWS_ID_TOKEN" > /tmp/web_identity_token
  - export AWS_ROLE_ARN=$AWS_ROLE_ARN
  - export AWS_WEB_IDENTITY_TOKEN_FILE=/tmp/web_identity_token
  - export AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION
  - echo "AWS_ROLE_ARN=$AWS_ROLE_ARN"
  - echo "AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION"
  - env | grep AWS

# ---------------- BOOTSTRAP ---------------- #

bootstrap:
  stage: bootstrap
  script:
    - cd bootstrap
    - terraform init -backend=false
    # S3 bucket import detection
    - |
      echo "[BOOTSTRAP] Checking S3 bucket..."
      if aws s3api head-bucket --bucket devops-platform4-terraform-state --region $AWS_DEFAULT_REGION 2>/dev/null; then
        echo "[BOOTSTRAP] S3 bucket exists, attempting import..."
        if ! terraform import aws_s3_bucket.state devops-platform4-terraform-state; then
          echo "[BOOTSTRAP] ERROR: S3 import failed. Aborting to prevent state/reality mismatch."
          exit 1
        fi
        echo "[BOOTSTRAP] S3 bucket imported successfully"
      else
        echo "[BOOTSTRAP] S3 bucket does not exist, will be created by apply"
      fi
    # DynamoDB lock table import detection
    - |
      echo "[BOOTSTRAP] Checking DynamoDB lock table..."
      if aws dynamodb describe-table --table-name terraform-locks --region $AWS_DEFAULT_REGION 2>/dev/null; then
        echo "[BOOTSTRAP] DynamoDB lock table exists, attempting import..."
        if ! terraform import aws_dynamodb_table.lock terraform-locks; then
          echo "[BOOTSTRAP] ERROR: DynamoDB import failed. Aborting to prevent state/reality mismatch."
          exit 1
        fi
        echo "[BOOTSTRAP] DynamoDB lock table imported successfully"
      else
        echo "[BOOTSTRAP] DynamoDB lock table does not exist, will be created by apply"
      fi
    - echo "[BOOTSTRAP] Applying bootstrap configuration..."
    - terraform apply -auto-approve
    - echo "[BOOTSTRAP] Bootstrap complete. Verifying resources..."
    - aws sts get-caller-identity
    - aws s3 ls s3://devops-platform4-terraform-state
    - aws dynamodb describe-table --table-name terraform-locks --region $AWS_DEFAULT_REGION

# ---------------- DEV ---------------- #

validate_dev:
  stage: validate
  script:
    - cd envs/dev
    - terraform init
    - terraform validate

plan_dev:
  stage: plan
  script:
    - cd envs/dev
    - terraform init
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - envs/dev/tfplan

apply_dev:
  stage: apply
  when: manual
  script:
    - cd envs/dev
    - terraform init
    - terraform apply -auto-approve tfplan

